<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Hand Visualizer</title>
<style>
:root {
  --bg: #1a1a2e;
  --bg-soft: #232342;
  --bg-soft-2: #2a2a4a;
  --felt-1: #2d5a27;
  --felt-2: #1e3d1a;
  --felt-rim: #c8a45c;
  --text: #e8e8e8;
  --text-dim: #9ca3af;
  --text-bright: #ffffff;
  --card-face: #fafafa;
  --card-red: #d0241c;
  --card-black: #1a1a1a;
  --card-back-1: #1e3a8a;
  --card-back-2: #1e1b4b;
  --acc-fold: #6b7280;
  --acc-check: #3b82f6;
  --acc-call: #10b981;
  --acc-bet: #f59e0b;
  --acc-raise: #ef4444;
  --acc-allin: #fbbf24;
  --hero-glow: #60a5fa;
  --winner-glow: #fbbf24;
  --rank-hc: #94a3b8;
  --rank-pair: #a3e635;
  --rank-2pair: #34d399;
  --rank-trips: #22d3ee;
  --rank-straight: #38bdf8;
  --rank-flush: #818cf8;
  --rank-fh: #c084fc;
  --rank-quads: #e879f9;
  --rank-sf: #f472b6;
  --rank-royal: #fbbf24;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  overflow-x: hidden;
}
#app { display: flex; flex-direction: column; min-height: 100vh; }

header.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: var(--bg-soft);
  border-bottom: 1px solid #2f2f55;
}
.title { font-size: 22px; font-weight: 700; color: var(--text-bright); letter-spacing: 0.5px; }
.title .pip { color: var(--felt-rim); margin-right: 6px; }
.scenario-select {
  background: var(--bg-soft-2);
  color: var(--text);
  border: 1px solid #3f3f6f;
  border-radius: 6px;
  padding: 6px 12px;
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
}
.hand-counter {
  font-family: 'Courier New', monospace;
  color: var(--text-dim);
  font-size: 14px;
}

main.main { display: flex; flex: 1; min-height: 640px; }
#table-area {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
aside#timeline {
  width: 300px;
  background: var(--bg-soft);
  border-left: 1px solid #2f2f55;
  display: flex;
  flex-direction: column;
}
.timeline-header {
  padding: 12px 16px;
  font-weight: 700;
  font-size: 13px;
  color: var(--text-bright);
  border-bottom: 1px solid #2f2f55;
  text-transform: uppercase;
  letter-spacing: 1.2px;
}
.timeline-body { flex: 1; overflow-y: auto; padding: 8px 0; max-height: calc(100vh - 260px); }
.timeline-body::-webkit-scrollbar { width: 6px; }
.timeline-body::-webkit-scrollbar-thumb { background: #3f3f6f; border-radius: 3px; }

.felt {
  position: relative;
  width: 100%;
  max-width: 900px;
  aspect-ratio: 16 / 10;
  background: radial-gradient(ellipse at center, var(--felt-1) 0%, var(--felt-2) 100%);
  border: 8px solid var(--felt-rim);
  border-radius: 50% / 40%;
  box-shadow: 0 0 0 4px #5a4a1c inset, 0 20px 60px rgba(0, 0, 0, 0.6);
}
.center-area {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
.pot {
  font-family: 'Courier New', monospace;
  font-size: 18px;
  color: var(--felt-rim);
  background: rgba(0, 0, 0, 0.55);
  padding: 6px 18px;
  border-radius: 20px;
  border: 1px solid var(--felt-rim);
  font-weight: 700;
  letter-spacing: 1px;
  transition: all 0.4s;
}
.pot.pot-grow { animation: potPulse 0.5s; }
@keyframes potPulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.12); color: #ffffff; }
  100% { transform: scale(1); }
}
.community { display: flex; gap: 8px; }

.card {
  background: var(--card-face);
  border-radius: 8px;
  display: inline-flex;
  flex-direction: column;
  position: relative;
  font-family: 'Georgia', serif;
  font-weight: bold;
  user-select: none;
  box-shadow: 0 3px 8px rgba(0, 0, 0, 0.5);
  transition: transform 0.3s, opacity 0.3s;
}
.card.size-seat { width: 44px; height: 62px; padding: 3px; }
.card.size-community { width: 60px; height: 84px; padding: 6px; }
.card.size-modal { width: 56px; height: 78px; padding: 5px; }
.card .rank-tl, .card .rank-br {
  position: absolute;
  font-size: 12px;
  line-height: 1.05;
  text-align: center;
}
.card.size-community .rank-tl, .card.size-community .rank-br { font-size: 15px; }
.card.size-modal .rank-tl, .card.size-modal .rank-br { font-size: 13px; }
.card .rank-tl { top: 3px; left: 4px; }
.card .rank-br { bottom: 3px; right: 4px; transform: rotate(180deg); }
.card .center-suit {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 24px;
}
.card.size-community .center-suit { font-size: 32px; }
.card.size-modal .center-suit { font-size: 28px; }
.card.red { color: var(--card-red); }
.card.black { color: var(--card-black); }
.card.back {
  background:
    repeating-linear-gradient(45deg, var(--card-back-1) 0px, var(--card-back-1) 4px, var(--card-back-2) 4px, var(--card-back-2) 8px),
    var(--card-back-1);
  border: 2px solid #fbbf24;
}
.card.back .rank-tl, .card.back .rank-br, .card.back .center-suit { display: none; }
.card.placeholder {
  background: rgba(255, 255, 255, 0.05);
  border: 1px dashed rgba(255, 255, 255, 0.2);
  box-shadow: none;
}
.card.placeholder .rank-tl, .card.placeholder .rank-br, .card.placeholder .center-suit { display: none; }
.card.flip-in { animation: flipIn 0.6s ease; }
@keyframes flipIn {
  from { transform: rotateY(180deg); opacity: 0.4; }
  to { transform: rotateY(0deg); opacity: 1; }
}

.seat {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  width: 124px;
  transform: translate(-50%, -50%);
  transition: opacity 0.3s;
}
.seat.folded { opacity: 0.42; }
.seat.acting .player-card-row {
  box-shadow: 0 0 0 3px var(--hero-glow), 0 0 18px var(--hero-glow);
  border-radius: 10px;
}
.seat.winner .player-card-row {
  box-shadow: 0 0 0 3px var(--winner-glow), 0 0 24px var(--winner-glow);
  border-radius: 10px;
  animation: winnerPulse 1.4s infinite;
}
@keyframes winnerPulse {
  0%, 100% { box-shadow: 0 0 0 3px var(--winner-glow), 0 0 22px var(--winner-glow); }
  50%      { box-shadow: 0 0 0 3px var(--winner-glow), 0 0 36px var(--winner-glow); }
}
.player-info {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(0, 0, 0, 0.72);
  padding: 4px 10px;
  border-radius: 14px;
  border: 1px solid rgba(255, 255, 255, 0.15);
}
.avatar {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 10px;
  color: white;
}
.player-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-bright);
  white-space: nowrap;
}
.player-card-row {
  display: flex;
  gap: 4px;
  padding: 4px;
  position: relative;
}
.stack {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  color: var(--felt-rim);
  background: rgba(0, 0, 0, 0.72);
  padding: 2px 8px;
  border-radius: 10px;
  border: 1px solid rgba(200, 164, 92, 0.5);
}
.action-badge {
  font-size: 10px;
  font-weight: 800;
  padding: 3px 8px;
  border-radius: 10px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: white;
  white-space: nowrap;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}
.action-badge.fold   { background: var(--acc-fold); }
.action-badge.check  { background: var(--acc-check); }
.action-badge.call   { background: var(--acc-call); }
.action-badge.bet    { background: var(--acc-bet); }
.action-badge.raise  { background: var(--acc-raise); }
.action-badge.allin  { background: var(--acc-allin); color: #1a1a1a; }
.position-badge {
  position: absolute;
  top: -8px;
  right: -8px;
  min-width: 22px;
  height: 22px;
  padding: 0 4px;
  background: var(--felt-rim);
  color: #1a1a1a;
  border-radius: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 800;
  border: 2px solid #1a1a1a;
}
.hand-strength {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 8px;
  background: rgba(0, 0, 0, 0.72);
  border: 1px solid;
}

.seat-0 { top: 20%; left: 20%; }
.seat-1 { top: 8%;  left: 50%; }
.seat-2 { top: 20%; left: 80%; }
.seat-3 { top: 80%; left: 80%; }
.seat-4 { top: 92%; left: 50%; }
.seat-5 { top: 80%; left: 20%; }

.seat:hover .tooltip { opacity: 1; }
.tooltip {
  position: absolute;
  bottom: 105%;
  left: 50%;
  transform: translateX(-50%);
  background: #0a0a1f;
  border: 1px solid #3f3f6f;
  border-radius: 6px;
  padding: 8px 10px;
  font-size: 11px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  z-index: 50;
}
.tooltip .row { display: flex; justify-content: space-between; gap: 16px; }
.tooltip .label { color: var(--text-dim); }
.tooltip .value { color: var(--text-bright); font-weight: 600; }

.timeline-street-header {
  padding: 8px 16px 4px;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-top: 1px solid #2f2f55;
  margin-top: 4px;
}
.timeline-street-header:first-child { border-top: none; margin-top: 0; }
.timeline-street-header .mini-cards { display: flex; gap: 2px; margin-left: auto; }
.timeline-street-header .mini {
  min-width: 18px;
  height: 24px;
  padding: 0 2px;
  background: var(--card-face);
  border-radius: 3px;
  font-size: 10px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Georgia', serif;
}
.timeline-street-header .mini.red { color: var(--card-red); }
.timeline-street-header .mini.black { color: var(--card-black); }

.timeline-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 16px;
  font-size: 12px;
  border-left: 3px solid transparent;
  transition: background 0.2s;
}
.timeline-row.future { opacity: 0.32; }
.timeline-row.current {
  background: rgba(96, 165, 250, 0.14);
  border-left-color: var(--hero-glow);
}
.timeline-row .tl-name { flex: 1; font-weight: 600; color: var(--text-bright); }
.timeline-row .tl-action {
  font-weight: 700;
  text-transform: uppercase;
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 8px;
  color: white;
}
.timeline-row .tl-action.fold   { background: var(--acc-fold); }
.timeline-row .tl-action.check  { background: var(--acc-check); }
.timeline-row .tl-action.call   { background: var(--acc-call); }
.timeline-row .tl-action.bet    { background: var(--acc-bet); }
.timeline-row .tl-action.raise  { background: var(--acc-raise); }
.timeline-row .tl-action.allin  { background: var(--acc-allin); color: #1a1a1a; }
.timeline-row .tl-amount {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  color: var(--felt-rim);
  min-width: 54px;
  text-align: right;
}

.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px 24px;
  background: var(--bg-soft);
  border-top: 1px solid #2f2f55;
  flex-wrap: wrap;
}
.btn {
  background: var(--bg-soft-2);
  color: var(--text);
  border: 1px solid #3f3f6f;
  border-radius: 6px;
  padding: 8px 14px;
  font-size: 14px;
  font-family: inherit;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.btn:hover { background: #3a3a5e; border-color: #5a5a8e; }
.btn:active { transform: translateY(1px); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn.primary {
  background: var(--hero-glow);
  border-color: var(--hero-glow);
  color: #0a0a1f;
  padding: 10px 22px;
  font-size: 15px;
}
.btn.primary:hover { background: #93c5fd; border-color: #93c5fd; }
.btn.gold {
  background: var(--felt-rim);
  border-color: var(--felt-rim);
  color: #1a1a1a;
}
.btn.gold:hover { background: #e5c07a; border-color: #e5c07a; }
.speed-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: 12px;
  padding-left: 12px;
  border-left: 1px solid #3f3f6f;
}
.speed-wrap label { font-size: 12px; color: var(--text-dim); }
.speed-wrap input { cursor: pointer; }
.speed-value {
  font-family: 'Courier New', monospace;
  font-size: 12px;
  color: var(--felt-rim);
  width: 42px;
}

.legend {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  gap: 14px;
  padding: 12px 24px;
  background: #12122a;
  border-top: 1px solid #2f2f55;
}
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-item .swatch { width: 10px; height: 10px; border-radius: 3px; }
.legend-item .label { font-size: 11px; font-weight: 700; color: var(--text); }
.legend-item .example {
  font-family: 'Georgia', serif;
  font-size: 11px;
  color: var(--text-dim);
  background: rgba(255,255,255,0.05);
  padding: 2px 6px;
  border-radius: 3px;
}

.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.modal-backdrop.show { opacity: 1; pointer-events: auto; }
.modal {
  background: linear-gradient(135deg, var(--bg-soft), var(--bg-soft-2));
  border: 2px solid var(--felt-rim);
  border-radius: 12px;
  padding: 28px 36px;
  max-width: 720px;
  width: 92%;
  max-height: 86vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(251, 191, 36, 0.3);
}
.modal h2 {
  text-align: center;
  font-size: 24px;
  color: var(--felt-rim);
  margin-bottom: 6px;
  letter-spacing: 1px;
}
.modal .sub {
  text-align: center;
  color: var(--text-dim);
  margin-bottom: 22px;
  font-family: 'Courier New', monospace;
  font-size: 14px;
}
.modal .reveals {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 22px;
}
.modal .reveal-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 14px;
  background: rgba(0, 0, 0, 0.3);
  border-radius: 8px;
  border-left: 3px solid #3f3f6f;
}
.modal .reveal-row.winner {
  border-left-color: var(--felt-rim);
  background: rgba(251, 191, 36, 0.08);
  box-shadow: 0 0 0 1px rgba(251, 191, 36, 0.4) inset;
}
.modal .reveal-row .player {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 120px;
  font-weight: 700;
  color: var(--text-bright);
}
.modal .reveal-row .cards { display: flex; gap: 4px; }
.modal .reveal-row .hand-name { flex: 1; font-size: 12px; color: var(--text); }
.modal .reveal-row .hand-name strong {
  display: block;
  color: var(--text-bright);
  font-size: 14px;
  margin-bottom: 2px;
}
.modal .reveal-row .winner-tag {
  background: var(--felt-rim);
  color: #1a1a1a;
  font-size: 10px;
  font-weight: 800;
  padding: 4px 8px;
  border-radius: 10px;
  letter-spacing: 1px;
}
.modal .modal-actions { display: flex; justify-content: center; gap: 12px; }
</style>
</head>
<body>
<div id="app">
  <header class="top-bar">
    <div class="title"><span class="pip">&#9824;</span>Poker Hand Visualizer</div>
    <select class="scenario-select" id="scenario-select">
      <option value="random">Random Hand</option>
      <option value="royal">Royal Flush Showdown</option>
      <option value="bluff">Dramatic River Bluff</option>
      <option value="allin">Multi-way All-In Pot</option>
      <option value="badbeat">Bad Beat: Quads vs Straight Flush</option>
      <option value="standard">Standard Showdown</option>
    </select>
    <div class="hand-counter">Hand #<span id="hand-num">1</span></div>
  </header>

  <main class="main">
    <section id="table-area">
      <div class="felt" id="felt">
        <div class="center-area">
          <div class="pot" id="pot">Pot: $0</div>
          <div class="community" id="community"></div>
        </div>
      </div>
    </section>
    <aside id="timeline">
      <div class="timeline-header">Action Timeline</div>
      <div class="timeline-body" id="timeline-body"></div>
    </aside>
  </main>

  <div class="controls">
    <button class="btn" id="btn-start">&#9198; Start</button>
    <button class="btn" id="btn-back">&#9664; Back</button>
    <button class="btn primary" id="btn-next">&#9654; Next</button>
    <button class="btn" id="btn-end">&#9197; End</button>
    <button class="btn" id="btn-auto">&#9199; Auto</button>
    <div class="speed-wrap">
      <label>Speed</label>
      <input type="range" id="speed" min="500" max="3000" step="100" value="1500">
      <span class="speed-value" id="speed-value">1.5s</span>
    </div>
    <button class="btn gold" id="btn-new">+ New Hand</button>
  </div>

  <footer class="legend" id="legend"></footer>

  <div class="modal-backdrop" id="modal">
    <div class="modal">
      <h2 id="modal-title">Showdown</h2>
      <div class="sub" id="modal-sub"></div>
      <div class="reveals" id="modal-reveals"></div>
      <div class="modal-actions">
        <button class="btn" id="modal-close">Close</button>
        <button class="btn primary" id="modal-next">Next Hand</button>
      </div>
    </div>
  </div>
</div>

<script>
/* =====================================================================
 * Poker Hand Visualizer — standalone single-file demo.
 * Vanilla JS, no dependencies. Open directly in any modern browser.
 * ===================================================================== */

const RANKS = ['2','3','4','5','6','7','8','9','T','J','Q','K','A'];
const SUITS = ['s','h','d','c'];
const SUIT_SYMBOL = { s: '\u2660', h: '\u2665', d: '\u2666', c: '\u2663' };
const SUIT_COLOR  = { s: 'black', h: 'red', d: 'red', c: 'black' };
const RANK_NAME = {
  0:'Two', 1:'Three', 2:'Four', 3:'Five', 4:'Six', 5:'Seven', 6:'Eight',
  7:'Nine', 8:'Ten', 9:'Jack', 10:'Queen', 11:'King', 12:'Ace'
};
const RANK_NAME_PLURAL = {
  0:'Twos', 1:'Threes', 2:'Fours', 3:'Fives', 4:'Sixes', 5:'Sevens', 6:'Eights',
  7:'Nines', 8:'Tens', 9:'Jacks', 10:'Queens', 11:'Kings', 12:'Aces'
};
const HAND_NAMES = [
  'High Card','Pair','Two Pair','Three of a Kind','Straight',
  'Flush','Full House','Four of a Kind','Straight Flush','Royal Flush'
];
const HAND_COLOR = [
  'var(--rank-hc)','var(--rank-pair)','var(--rank-2pair)','var(--rank-trips)',
  'var(--rank-straight)','var(--rank-flush)','var(--rank-fh)','var(--rank-quads)',
  'var(--rank-sf)','var(--rank-royal)'
];

const SMALL_BLIND = 5;
const BIG_BLIND = 10;
const STARTING_STACK = 1000;
const HERO_IDX = 4;
const N_PLAYERS = 6;

const PLAYER_TEMPLATE = [
  { name: 'Alice',  color: '#ef4444', initial: 'A' },
  { name: 'Bjorn',  color: '#f59e0b', initial: 'B' },
  { name: 'Carmen', color: '#10b981', initial: 'C' },
  { name: 'Dmitri', color: '#06b6d4', initial: 'D' },
  { name: 'Hero',   color: '#60a5fa', initial: 'H' },
  { name: 'Sasha',  color: '#a855f7', initial: 'S' },
];

/* ---------- Card helpers ---------- */
function cardRank(c) { return RANKS.indexOf(c[0]); }
function cardSuit(c) { return c[1]; }
function makeDeck() {
  const d = [];
  for (const r of RANKS) for (const s of SUITS) d.push(r + s);
  return d;
}
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const t = arr[i]; arr[i] = arr[j]; arr[j] = t;
  }
  return arr;
}

/* ---------- Hand Evaluator ----------
 * evaluate5(cards): 5-card hand -> { rank, name, score, description }
 * score is a lex-comparable array: [rank, ...tiebreakers]
 */
function evaluate5(cards) {
  const ranks = cards.map(cardRank).sort((a, b) => b - a);
  const suits = cards.map(cardSuit);
  const isFlush = suits.every(s => s === suits[0]);

  const unique = [...new Set(ranks)].sort((a, b) => b - a);
  let isStraight = false;
  let straightHigh = -1;
  if (unique.length === 5) {
    if (unique[0] - unique[4] === 4) {
      isStraight = true;
      straightHigh = unique[0];
    } else if (unique[0] === 12 && unique[1] === 3 && unique[2] === 2 && unique[3] === 1 && unique[4] === 0) {
      isStraight = true;
      straightHigh = 3; // wheel: 5-high straight
    }
  }

  const counts = {};
  for (const r of ranks) counts[r] = (counts[r] || 0) + 1;
  const groups = Object.entries(counts)
    .map(([r, c]) => [parseInt(r, 10), c])
    .sort((a, b) => b[1] - a[1] || b[0] - a[0]);

  if (isFlush && isStraight && straightHigh === 12) {
    return { rank: 9, name: 'Royal Flush', score: [9], description: 'Royal Flush' };
  }
  if (isFlush && isStraight) {
    return {
      rank: 8, name: 'Straight Flush',
      score: [8, straightHigh],
      description: `${RANK_NAME[straightHigh]}-high Straight Flush`
    };
  }
  if (groups[0][1] === 4) {
    return {
      rank: 7, name: 'Four of a Kind',
      score: [7, groups[0][0], groups[1][0]],
      description: `Four ${RANK_NAME_PLURAL[groups[0][0]]}`
    };
  }
  if (groups[0][1] === 3 && groups[1] && groups[1][1] >= 2) {
    return {
      rank: 6, name: 'Full House',
      score: [6, groups[0][0], groups[1][0]],
      description: `${RANK_NAME_PLURAL[groups[0][0]]} full of ${RANK_NAME_PLURAL[groups[1][0]]}`
    };
  }
  if (isFlush) {
    return {
      rank: 5, name: 'Flush',
      score: [5, ...ranks],
      description: `${RANK_NAME[ranks[0]]}-high Flush`
    };
  }
  if (isStraight) {
    return {
      rank: 4, name: 'Straight',
      score: [4, straightHigh],
      description: `${RANK_NAME[straightHigh]}-high Straight`
    };
  }
  if (groups[0][1] === 3) {
    const kickers = ranks.filter(r => r !== groups[0][0]);
    return {
      rank: 3, name: 'Three of a Kind',
      score: [3, groups[0][0], ...kickers],
      description: `Three ${RANK_NAME_PLURAL[groups[0][0]]}`
    };
  }
  if (groups[0][1] === 2 && groups[1] && groups[1][1] === 2) {
    return {
      rank: 2, name: 'Two Pair',
      score: [2, groups[0][0], groups[1][0], groups[2][0]],
      description: `${RANK_NAME_PLURAL[groups[0][0]]} and ${RANK_NAME_PLURAL[groups[1][0]]}`
    };
  }
  if (groups[0][1] === 2) {
    const kickers = ranks.filter(r => r !== groups[0][0]);
    return {
      rank: 1, name: 'Pair',
      score: [1, groups[0][0], ...kickers],
      description: `Pair of ${RANK_NAME_PLURAL[groups[0][0]]}`
    };
  }
  return {
    rank: 0, name: 'High Card',
    score: [0, ...ranks],
    description: `${RANK_NAME[ranks[0]]} High`
  };
}

function evaluateHand(hole, community) {
  const all = [...hole, ...community].filter(Boolean);
  if (all.length < 5) {
    return { rank: 0, name: 'Incomplete', score: [0], description: 'Waiting' };
  }
  if (all.length === 5) return evaluate5(all);
  let best = null;
  const idx = [];
  const k = 5;
  function combos(start, depth) {
    if (depth === k) {
      const five = idx.map(i => all[i]);
      const ev = evaluate5(five);
      if (!best || compareHands(ev, best) > 0) best = ev;
      return;
    }
    for (let i = start; i <= all.length - (k - depth); i++) {
      idx.push(i);
      combos(i + 1, depth + 1);
      idx.pop();
    }
  }
  combos(0, 0);
  return best;
}

function compareHands(a, b) {
  const len = Math.max(a.score.length, b.score.length);
  for (let i = 0; i < len; i++) {
    const av = a.score[i] || 0;
    const bv = b.score[i] || 0;
    if (av > bv) return 1;
    if (av < bv) return -1;
  }
  return 0;
}

/* ---------- Strength estimator (for AI decisions) ---------- */
function estimateStrength(hole, community) {
  if (!hole || hole.length < 2) return 0.3;
  if (community.length === 0) {
    const r1 = cardRank(hole[0]);
    const r2 = cardRank(hole[1]);
    const suited = cardSuit(hole[0]) === cardSuit(hole[1]);
    if (r1 === r2) return 0.55 + (r1 / 12) * 0.45;
    const high = Math.max(r1, r2);
    const low = Math.min(r1, r2);
    let s = (high * 1.5 + low) / 30;
    if (suited) s += 0.1;
    if (high - low === 1) s += 0.06;
    if (high === 12) s += 0.08;
    return Math.min(1, Math.max(0, s));
  }
  const ev = evaluateHand(hole, community);
  const base = [0.18, 0.4, 0.6, 0.74, 0.82, 0.87, 0.93, 0.97, 0.99, 1.0];
  return base[ev.rank];
}

function communityCount(street) {
  return { preflop: 0, flop: 3, turn: 4, river: 5 }[street];
}

function betSize(state, currentBet, fraction) {
  const size = Math.max(BIG_BLIND, Math.round(state.pot * fraction / 5) * 5);
  return currentBet + size;
}
function raiseSize(state, currentBet) {
  const size = Math.max(currentBet * 2, currentBet + Math.round(state.pot * 0.6 / 5) * 5);
  return Math.round(size / 5) * 5;
}

function decideAction(player, idx, state, street, callAmount, currentBet) {
  const visible = state.community.slice(0, communityCount(street));
  const hole = state.holeCards[idx];
  const strength = estimateStrength(hole, visible);
  const potOdds = callAmount / (state.pot + callAmount + 0.001);
  const r = Math.random();

  if (callAmount === 0) {
    if (strength > 0.75) {
      if (r < 0.7) return { type: 'bet', amount: betSize(state, currentBet, 0.6) };
      return { type: 'check' };
    } else if (strength > 0.45) {
      if (r < 0.3) return { type: 'bet', amount: betSize(state, currentBet, 0.4) };
      return { type: 'check' };
    } else {
      if (r < 0.07) return { type: 'bet', amount: betSize(state, currentBet, 0.5) };
      return { type: 'check' };
    }
  } else {
    if (strength > 0.8) {
      if (r < 0.45) return { type: 'raise', amount: raiseSize(state, currentBet) };
      if (r < 0.97) return { type: 'call' };
      return { type: 'fold' };
    } else if (strength > 0.55) {
      if (r < 0.15) return { type: 'raise', amount: raiseSize(state, currentBet) };
      if (r < 0.85) return { type: 'call' };
      return { type: 'fold' };
    } else if (strength > 0.35) {
      if (r < 0.55 && potOdds < 0.28) return { type: 'call' };
      return { type: 'fold' };
    } else {
      if (r < 0.04) return { type: 'raise', amount: raiseSize(state, currentBet) };
      if (r < 0.12 && potOdds < 0.18) return { type: 'call' };
      return { type: 'fold' };
    }
  }
}

/* ---------- Betting simulation (returns action list, mutates state) ---------- */
function simulateBettingRound(state, street) {
  const N = state.players.length;
  const actions = [];

  if (street !== 'preflop') {
    state.players.forEach(p => { if (!p.folded && !p.allIn) p.currentBet = 0; });
  }

  let currentBet = street === 'preflop' ? BIG_BLIND : 0;
  let firstToAct = street === 'preflop'
    ? (state.dealerIdx + 3) % N
    : (state.dealerIdx + 1) % N;

  const needsToAct = new Array(N).fill(false);
  for (let k = 0; k < N; k++) {
    if (!state.players[k].folded && !state.players[k].allIn && state.players[k].stack > 0) {
      needsToAct[k] = true;
    }
  }

  let i = firstToAct;
  let guard = 0;
  while (state.players[i].folded || state.players[i].allIn || !needsToAct[i]) {
    i = (i + 1) % N;
    if (++guard > N * 2) return actions;
  }

  let safety = 0;
  while (needsToAct.some(x => x) && safety < 240) {
    safety++;
    const player = state.players[i];

    if (player.folded || player.allIn || !needsToAct[i]) {
      i = (i + 1) % N;
      continue;
    }

    if (state.players.filter(p => !p.folded).length === 1) break;

    const callAmount = currentBet - player.currentBet;
    const decision = decideAction(player, i, state, street, callAmount, currentBet);

    const action = {
      player: i, type: decision.type, amount: 0,
      street, potBefore: state.pot,
    };

    if (decision.type === 'fold') {
      player.folded = true;
    } else if (decision.type === 'check') {
      // no chips
    } else if (decision.type === 'call') {
      const chips = Math.min(callAmount, player.stack);
      player.stack -= chips;
      player.currentBet += chips;
      state.pot += chips;
      action.amount = chips;
      if (player.stack === 0) player.allIn = true;
    } else if (decision.type === 'bet' || decision.type === 'raise') {
      const targetBet = Math.min(decision.amount, player.currentBet + player.stack);
      const chips = targetBet - player.currentBet;
      player.stack -= chips;
      player.currentBet = targetBet;
      state.pot += chips;
      currentBet = targetBet;
      action.amount = targetBet;
      if (player.stack === 0) player.allIn = true;
      for (let k = 0; k < N; k++) {
        if (k !== i && !state.players[k].folded && !state.players[k].allIn && state.players[k].stack > 0) {
          needsToAct[k] = true;
        }
      }
    }

    needsToAct[i] = false;
    action.potAfter = state.pot;
    actions.push(action);

    if (state.players.filter(p => !p.folded).length === 1) break;

    i = (i + 1) % N;
    let innerGuard = 0;
    while (state.players[i].folded || state.players[i].allIn) {
      i = (i + 1) % N;
      if (++innerGuard > N * 2) break;
    }
  }

  return actions;
}

/* ---------- Random hand generator ---------- */
function generateRandomHand(handNum) {
  const players = PLAYER_TEMPLATE.map((p, i) => ({
    ...p, id: i, stack: STARTING_STACK,
    currentBet: 0, folded: false, allIn: false,
  }));
  const dealerIdx = (handNum + HERO_IDX + 1) % N_PLAYERS;
  const deck = shuffle(makeDeck());
  const holeCards = {};
  for (let i = 0; i < N_PLAYERS; i++) holeCards[i] = [deck.pop(), deck.pop()];
  const community = [deck.pop(), deck.pop(), deck.pop(), deck.pop(), deck.pop()];

  const state = { players, dealerIdx, holeCards, community, pot: 0 };
  const sbIdx = (dealerIdx + 1) % N_PLAYERS;
  const bbIdx = (dealerIdx + 2) % N_PLAYERS;
  state.players[sbIdx].stack -= SMALL_BLIND;
  state.players[sbIdx].currentBet = SMALL_BLIND;
  state.players[bbIdx].stack -= BIG_BLIND;
  state.players[bbIdx].currentBet = BIG_BLIND;
  state.pot = SMALL_BLIND + BIG_BLIND;

  const allActions = [];
  const streets = ['preflop', 'flop', 'turn', 'river'];
  for (let si = 0; si < streets.length; si++) {
    const street = streets[si];
    const active = state.players.filter(p => !p.folded);
    if (active.length < 2) break;
    const acts = simulateBettingRound(state, street);
    allActions.push(...acts);

    const stillActive = state.players.filter(p => !p.folded);
    const canStillAct = stillActive.filter(p => !p.allIn && p.stack > 0);
    if (stillActive.length >= 2 && canStillAct.length < 2 && si < streets.length - 1) {
      for (let j = si + 1; j < streets.length; j++) {
        allActions.push({
          player: -1, type: 'deal', amount: 0, street: streets[j],
          potBefore: state.pot, potAfter: state.pot,
        });
      }
      break;
    }
  }

  const finalActive = state.players
    .map((p, i) => ({ p, i }))
    .filter(({ p }) => !p.folded);

  let winners = [];
  let winnerHand = null;
  let winnerDescription = '';
  if (finalActive.length === 1) {
    winners = [finalActive[0].i];
    winnerDescription = `${finalActive[0].p.name} wins uncontested`;
  } else {
    let best = null;
    for (const { p, i } of finalActive) {
      const ev = evaluateHand(holeCards[i], community);
      if (!best || compareHands(ev, best.ev) > 0) best = { ev, indices: [i] };
      else if (compareHands(ev, best.ev) === 0) best.indices.push(i);
    }
    winners = best.indices;
    winnerHand = best.ev;
    const winnerNames = winners.map(i => PLAYER_TEMPLATE[i].name).join(' & ');
    winnerDescription = `${winnerNames} ${winners.length > 1 ? 'split' : 'wins'} with ${best.ev.description}`;
  }

  return {
    id: 'random-' + handNum,
    players: PLAYER_TEMPLATE.map((p, i) => ({ ...p, id: i, stack: STARTING_STACK })),
    dealerIdx, holeCards, community,
    actions: allActions,
    winners, winnerHand, winnerDescription,
  };
}

/* ---------- Pre-built scenarios ----------
 * Action semantics:
 *   fold  / check             -> amount = 0
 *   call                      -> amount = chips called (not new total)
 *   bet / raise / allin       -> amount = NEW TOTAL bet level for this street
 *   deal                      -> phantom street advance, player = -1, amount = 0
 * The helper `buildActions` replays per-player bet levels and tracks pot.
 */
function buildActions(dealerIdx, spec) {
  const playerBets = new Array(N_PLAYERS).fill(0);
  const sb = (dealerIdx + 1) % N_PLAYERS;
  const bb = (dealerIdx + 2) % N_PLAYERS;
  playerBets[sb] = SMALL_BLIND;
  playerBets[bb] = BIG_BLIND;
  let pot = SMALL_BLIND + BIG_BLIND;
  let curStreet = 'preflop';

  return spec.map(row => {
    const [player, type, amount, street] = row;
    if (street !== curStreet) {
      for (let k = 0; k < N_PLAYERS; k++) playerBets[k] = 0;
      curStreet = street;
    }
    const before = pot;
    let chips = 0;
    if (type === 'call') {
      chips = amount;
      playerBets[player] += chips;
    } else if (type === 'bet' || type === 'raise' || type === 'allin') {
      chips = amount - playerBets[player];
      playerBets[player] = amount;
    }
    pot += chips;
    return { player, type, amount, street, potBefore: before, potAfter: pot };
  });
}

function makeBasePlayers() {
  return PLAYER_TEMPLATE.map((p, i) => ({ ...p, id: i, stack: STARTING_STACK }));
}

function buildScenario(opts) {
  return {
    id: opts.id,
    players: makeBasePlayers(),
    dealerIdx: opts.dealerIdx,
    holeCards: opts.holeCards,
    community: opts.community,
    actions: opts.actions,
    winners: opts.winners,
    winnerHand: opts.winnerHand,
    winnerDescription: opts.winnerDescription,
  };
}

    [3,'call',  140, 'river'],
  ]);
  return buildScenario({
    id: 'standard',
    dealerIdx, holeCards, community, actions,
    winners: [4],
    winnerHand: { rank: 2, name: 'Two Pair', description: 'Aces and Kings' },
    winnerDescription: 'Hero wins with Two Pair, Aces and Kings',
  });
}

const SCENARIOS = {
  random:   generateRandomHand,
  royal:    scenarioRoyalFlush,
  bluff:    scenarioBluff,
  allin:    scenarioMultiwayAllIn,
  badbeat:  scenarioBadBeat,
  standard: scenarioStandard,
};

/* ---------- State derivation ---------- */
function deriveState(hand, actionIdx) {
  const players = hand.players.map(p => ({
    ...p,
    stack: STARTING_STACK,
    currentBet: 0,
    folded: false,
    allIn: false,
    lastAction: null,
  }));
  const sbIdx = (hand.dealerIdx + 1) % N_PLAYERS;
  const bbIdx = (hand.dealerIdx + 2) % N_PLAYERS;
  players[sbIdx].stack -= SMALL_BLIND;
  players[sbIdx].currentBet = SMALL_BLIND;
  players[bbIdx].stack -= BIG_BLIND;
  players[bbIdx].currentBet = BIG_BLIND;
  let pot = SMALL_BLIND + BIG_BLIND;
  let street = 'preflop';
  const seenStreets = new Set(['preflop']);

  for (let i = 0; i <= actionIdx && i < hand.actions.length; i++) {
    const a = hand.actions[i];
    if (a.street !== street) {
      players.forEach(p => { p.currentBet = 0; });
      street = a.street;
      seenStreets.add(street);
    }
    if (a.type === 'deal') continue;
    const p = players[a.player];
    if (!p) continue;
    if (a.type === 'fold') {
      p.folded = true;
    } else if (a.type === 'check') {
      // no-op
    } else if (a.type === 'call') {
      const chips = a.amount;
      p.stack -= chips;
      p.currentBet += chips;
      pot += chips;
    } else if (a.type === 'bet' || a.type === 'raise') {
      const chips = a.amount - p.currentBet;
      p.stack -= chips;
      p.currentBet = a.amount;
      pot += chips;
    } else if (a.type === 'allin') {
      const chips = a.amount - p.currentBet;
      p.stack -= chips;
      p.currentBet = a.amount;
      p.allIn = true;
      pot += chips;
    }
    p.lastAction = { type: a.type, amount: a.amount };
  }

  // Find next actor for highlight
  let actingIdx = -1;
  for (let j = actionIdx + 1; j < hand.actions.length; j++) {
    if (hand.actions[j].type !== 'deal') {
      actingIdx = hand.actions[j].player;
      break;
    }
  }

  let revealCount = 0;
  if (seenStreets.has('flop')) revealCount = 3;
  if (seenStreets.has('turn')) revealCount = 4;
  if (seenStreets.has('river')) revealCount = 5;

  const isComplete = actionIdx >= hand.actions.length - 1;

  return {
    players, pot, street, revealCount,
    actingIdx, isComplete,
    sbIdx, bbIdx, dealerIdx: hand.dealerIdx,
  };
}

/* ---------- Rendering ---------- */
function renderCard(card, opts) {
  opts = opts || {};
  const size = opts.size || 'seat';
  const faceDown = opts.faceDown || false;
  if (!card) {
    return `<div class="card placeholder size-${size}"></div>`;
  }
  if (faceDown) {
    return `<div class="card back size-${size}"></div>`;
  }
  const r = card[0];
  const s = card[1];
  const color = SUIT_COLOR[s];
  const sym = SUIT_SYMBOL[s];
  const rankDisp = r === 'T' ? '10' : r;
  return `<div class="card ${color} size-${size}">`
       + `<div class="rank-tl">${rankDisp}<br>${sym}</div>`
       + `<div class="center-suit">${sym}</div>`
       + `<div class="rank-br">${rankDisp}<br>${sym}</div>`
       + `</div>`;
}

function renderMiniCard(card) {
  if (!card) return '';
  const color = SUIT_COLOR[card[1]];
  const r = card[0] === 'T' ? '10' : card[0];
  return `<div class="mini ${color}">${r}${SUIT_SYMBOL[card[1]]}</div>`;
}

function render() {
  const hand = state.hand;
  if (!hand) return;
  const view = deriveState(hand, state.actionIdx);

  renderTable(hand, view);
  renderTimeline(hand, view);
  renderControls(view);

  if (view.isComplete && !state.modalOpen) {
    showShowdownModal(hand, view);
  } else if (!view.isComplete && state.modalOpen) {
    hideModal();
  }
}

function renderTable(hand, view) {
  const potEl = document.getElementById('pot');
  const prevPot = parseInt(potEl.dataset.value || '0', 10);
  potEl.textContent = `Pot: $${view.pot}`;
  potEl.dataset.value = view.pot;
  if (view.pot > prevPot) {
    potEl.classList.remove('pot-grow');
    void potEl.offsetWidth;
    potEl.classList.add('pot-grow');
  }

  const commEl = document.getElementById('community');
  let commHtml = '';
  for (let i = 0; i < 5; i++) {
    const visible = i < view.revealCount;
    commHtml += renderCard(visible ? hand.community[i] : null, { size: 'community' });
  }
  commEl.innerHTML = commHtml;

  const felt = document.getElementById('felt');
  felt.querySelectorAll('.seat').forEach(s => s.remove());

  for (let i = 0; i < N_PLAYERS; i++) {
    const player = view.players[i];
    const isHero = i === HERO_IDX;
    const isWinner = view.isComplete && hand.winners.includes(i);
    const isActing = i === view.actingIdx && !view.isComplete;

    const seat = document.createElement('div');
    seat.className = `seat seat-${i}`
      + (player.folded ? ' folded' : '')
      + (isActing ? ' acting' : '')
      + (isWinner ? ' winner' : '');

    let posBadge = '';
    if (i === view.dealerIdx) posBadge = '<div class="position-badge">D</div>';
    else if (i === view.sbIdx) posBadge = '<div class="position-badge">SB</div>';
    else if (i === view.bbIdx) posBadge = '<div class="position-badge">BB</div>';

    // Reveal villain hole cards at showdown if they're among the winners
    // or at least one non-folded player is a winner (showdown reached).
    const showdownReveal = view.isComplete && !player.folded && hand.winners.length > 0
      && view.players.filter(p => !p.folded).length >= 2;
    const showFaceUp = isHero || showdownReveal;
    const cardHtml =
      renderCard(showFaceUp ? hand.holeCards[i][0] : null, { faceDown: !showFaceUp }) +
      renderCard(showFaceUp ? hand.holeCards[i][1] : null, { faceDown: !showFaceUp });

    let strengthHtml = '';
    if (showFaceUp && view.revealCount >= 3) {
      const ev = evaluateHand(hand.holeCards[i], hand.community.slice(0, view.revealCount));
      strengthHtml = `<div class="hand-strength" style="color:${HAND_COLOR[ev.rank]};border-color:${HAND_COLOR[ev.rank]};">${ev.name}</div>`;
    }

    let actionHtml = '';
    if (player.folded) {
      actionHtml = `<div class="action-badge fold">FOLD</div>`;
    } else if (player.lastAction) {
      const a = player.lastAction;
      const verb = a.type.toUpperCase();
      const amt = (a.type === 'fold' || a.type === 'check') ? '' : ` $${a.amount}`;
      actionHtml = `<div class="action-badge ${a.type}">${verb}${amt}</div>`;
    }

    const tooltipHtml =
      `<div class="tooltip">`
      + `<div class="row"><span class="label">Hand</span><span class="value">#${state.handNum}</span></div>`
      + `<div class="row"><span class="label">VPIP</span><span class="value">~${20 + i * 6}%</span></div>`
      + `<div class="row"><span class="label">PFR</span><span class="value">~${10 + i * 4}%</span></div>`
      + `<div class="row"><span class="label">Stack</span><span class="value">$${player.stack}</span></div>`
      + `</div>`;

    seat.innerHTML =
        tooltipHtml
      + `<div class="player-info">`
      +   `<div class="avatar" style="background:${player.color}">${player.initial}</div>`
      +   `<div class="player-name">${player.name}</div>`
      + `</div>`
      + `<div class="player-card-row">${cardHtml}${posBadge}</div>`
      + `<div class="stack">$${player.stack}</div>`
      + (actionHtml || '')
      + (strengthHtml || '');

    felt.appendChild(seat);
  }
}

function renderTimeline(hand, view) {
  const body = document.getElementById('timeline-body');
  let html = '';
  let lastStreet = null;
  for (let i = 0; i < hand.actions.length; i++) {
    const a = hand.actions[i];
    if (a.street !== lastStreet) {
      lastStreet = a.street;
      const count = communityCount(a.street);
      // Show mini cards only if this street's community has been reached in playback
      const reached = i <= state.actionIdx + 1; // reveal cards once we're at or past this street
      const anyInStreetSeen = state.actionIdx >= 0 && hand.actions
        .slice(0, state.actionIdx + 1)
        .some(x => x.street === a.street);
      const showCards = anyInStreetSeen ? count : 0;
      const miniHtml = hand.community.slice(0, showCards).map(renderMiniCard).join('');
      html += `<div class="timeline-street-header">${a.street}<div class="mini-cards">${miniHtml}</div></div>`;
    }
    if (a.type === 'deal') continue;
    const cls = i === state.actionIdx ? 'current' : (i > state.actionIdx ? 'future' : '');
    const playerName = hand.players[a.player].name;
    const verb = a.type.toUpperCase();
    const amt = (a.type === 'fold' || a.type === 'check') ? '' : `$${a.amount}`;
    html += `<div class="timeline-row ${cls}">`
          +   `<span class="tl-name">${playerName}</span>`
          +   `<span class="tl-action ${a.type}">${verb}</span>`
          +   `<span class="tl-amount">${amt}</span>`
          + `</div>`;
  }
  body.innerHTML = html;
  const cur = body.querySelector('.timeline-row.current');
  if (cur) cur.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function renderControls(view) {
  document.getElementById('btn-back').disabled  = state.actionIdx < 0;
  document.getElementById('btn-start').disabled = state.actionIdx < 0;
  document.getElementById('btn-next').disabled  = state.actionIdx >= state.hand.actions.length - 1;
  document.getElementById('btn-end').disabled   = state.actionIdx >= state.hand.actions.length - 1;
  document.getElementById('hand-num').textContent = state.handNum;
}

/* ---------- Showdown modal ---------- */
function showShowdownModal(hand, view) {
  const modal = document.getElementById('modal');
  const titleEl = document.getElementById('modal-title');
  const subEl = document.getElementById('modal-sub');
  const reveals = document.getElementById('modal-reveals');

  const activeAtEnd = view.players.filter(p => !p.folded).length;
  titleEl.textContent = activeAtEnd >= 2 ? '\u2600 Showdown' : '\u2600 Hand Complete';
  subEl.textContent = `${hand.winnerDescription} \u00b7 Pot: $${view.pot}`;

  // Which players to reveal:
  //  - all non-folded players (showdown participants)
  //  - for the bluff scenario we also reveal the folder so the user can savor the bluff
  const showPlayers = view.players
    .map((p, i) => ({ p, i }))
    .filter(({ p, i }) => !p.folded || hand.id === 'bluff');

  let html = '';
  for (const { p, i } of showPlayers) {
    const ev = evaluateHand(hand.holeCards[i], hand.community);
    const isWinner = hand.winners.includes(i);
    const cardsHtml = hand.holeCards[i].map(c => renderCard(c, { size: 'modal' })).join('');
    html += `<div class="reveal-row ${isWinner ? 'winner' : ''}">`
          +   `<div class="player">`
          +     `<div class="avatar" style="background:${p.color}">${p.initial}</div>`
          +     `<span>${p.name}</span>`
          +   `</div>`
          +   `<div class="cards">${cardsHtml}</div>`
          +   `<div class="hand-name"><strong>${ev.name}</strong>${ev.description}</div>`
          +   (isWinner ? `<div class="winner-tag">WINNER</div>` : '')
          + `</div>`;
  }
  reveals.innerHTML = html;
  modal.classList.add('show');
  state.modalOpen = true;
  reveals.querySelectorAll('.card').forEach((c, i) => {
    c.style.animationDelay = `${i * 70}ms`;
    c.classList.add('flip-in');
  });
}

function hideModal() {
  document.getElementById('modal').classList.remove('show');
  state.modalOpen = false;
}

/* ---------- State + controls ---------- */
const state = {
  hand: null,
  actionIdx: -1,
  handNum: 1,
  scenario: 'random',
  autoPlay: false,
  speedMs: 1500,
  autoTimer: null,
  modalOpen: false,
};

function newHand(scenarioKey) {
  if (scenarioKey) state.scenario = scenarioKey;
  state.hand = SCENARIOS[state.scenario](state.handNum);
  state.actionIdx = -1;
  state.modalOpen = false;
  hideModal();
  render();
  state.handNum += 1;
}
function stepNext() {
  if (state.actionIdx < state.hand.actions.length - 1) {
    state.actionIdx++;
    // Auto-skip phantom deal actions (they advance the street but shouldn't count as stops)
    while (
      state.actionIdx < state.hand.actions.length - 1 &&
      state.hand.actions[state.actionIdx].type === 'deal'
    ) {
      state.actionIdx++;
    }
    render();
  } else {
    stopAutoPlay();
  }
}
function stepBack() {
  if (state.actionIdx >= 0) {
    state.actionIdx--;
    while (
      state.actionIdx >= 0 &&
      state.hand.actions[state.actionIdx] &&
      state.hand.actions[state.actionIdx].type === 'deal'
    ) {
      state.actionIdx--;
    }
    hideModal();
    render();
  }
}
function jumpStart() {
  state.actionIdx = -1;
  hideModal();
  render();
}
function jumpEnd() {
  state.actionIdx = state.hand.actions.length - 1;
  render();
}
function toggleAutoPlay() {
  if (state.autoPlay) stopAutoPlay();
  else startAutoPlay();
}
function startAutoPlay() {
  if (state.actionIdx >= state.hand.actions.length - 1) return;
  state.autoPlay = true;
  document.getElementById('btn-auto').textContent = '\u23f8 Pause';
  state.autoTimer = setInterval(() => {
    if (state.actionIdx >= state.hand.actions.length - 1) {
      stopAutoPlay();
      return;
    }
    stepNext();
  }, state.speedMs);
}
function stopAutoPlay() {
  state.autoPlay = false;
  document.getElementById('btn-auto').textContent = '\u23ef Auto';
  if (state.autoTimer) clearInterval(state.autoTimer);
  state.autoTimer = null;
}

/* ---------- Legend ---------- */
function buildLegend() {
  const items = [
    { name: 'High Card',       cards: ['As','Td','7c','5h','2s'], color: 'var(--rank-hc)' },
    { name: 'Pair',            cards: ['Ks','Kd','7c','5h','2s'], color: 'var(--rank-pair)' },
    { name: 'Two Pair',        cards: ['As','Ad','9c','9h','2s'], color: 'var(--rank-2pair)' },
    { name: 'Three of a Kind', cards: ['Qs','Qd','Qc','5h','2s'], color: 'var(--rank-trips)' },
    { name: 'Straight',        cards: ['5s','6d','7c','8h','9s'], color: 'var(--rank-straight)' },
    { name: 'Flush',           cards: ['As','Js','9s','5s','2s'], color: 'var(--rank-flush)' },
    { name: 'Full House',      cards: ['Ks','Kd','Kc','5h','5s'], color: 'var(--rank-fh)' },
    { name: 'Four of a Kind',  cards: ['9s','9d','9c','9h','2s'], color: 'var(--rank-quads)' },
    { name: 'Straight Flush',  cards: ['5h','6h','7h','8h','9h'], color: 'var(--rank-sf)' },
    { name: 'Royal Flush',     cards: ['Th','Jh','Qh','Kh','Ah'], color: 'var(--rank-royal)' },
  ];
  const el = document.getElementById('legend');
  el.innerHTML = items.map(it => {
    const ex = it.cards.map(c => {
      const r = c[0] === 'T' ? '10' : c[0];
      const sym = SUIT_SYMBOL[c[1]];
      const cls = SUIT_COLOR[c[1]];
      const col = cls === 'red' ? 'var(--card-red)' : '#e2e8f0';
      return `<span style="color:${col}">${r}${sym}</span>`;
    }).join(' ');
    return `<div class="legend-item">`
         +   `<div class="swatch" style="background:${it.color}"></div>`
         +   `<div class="label">${it.name}</div>`
         +   `<div class="example">${ex}</div>`
         + `</div>`;
  }).join('');
}

/* ---------- Init ---------- */
function init() {
  buildLegend();

  document.getElementById('scenario-select').addEventListener('change', e => {
    stopAutoPlay();
    newHand(e.target.value);
  });
  document.getElementById('btn-start').addEventListener('click', () => { stopAutoPlay(); jumpStart(); });
  document.getElementById('btn-back').addEventListener('click',  () => { stopAutoPlay(); stepBack(); });
  document.getElementById('btn-next').addEventListener('click',  stepNext);
  document.getElementById('btn-end').addEventListener('click',   () => { stopAutoPlay(); jumpEnd(); });
  document.getElementById('btn-auto').addEventListener('click',  toggleAutoPlay);
  document.getElementById('btn-new').addEventListener('click',   () => { stopAutoPlay(); newHand(state.scenario); });
  document.getElementById('modal-close').addEventListener('click', hideModal);
  document.getElementById('modal-next').addEventListener('click', () => {
    hideModal();
    newHand(state.scenario);
  });

  const speedEl = document.getElementById('speed');
  const speedValEl = document.getElementById('speed-value');
  speedEl.addEventListener('input', e => {
    state.speedMs = parseInt(e.target.value, 10);
    speedValEl.textContent = (state.speedMs / 1000).toFixed(1) + 's';
    if (state.autoPlay) { stopAutoPlay(); startAutoPlay(); }
  });

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    if (e.key === 'ArrowRight') { e.preventDefault(); stepNext(); }
    else if (e.key === 'ArrowLeft') { e.preventDefault(); stepBack(); }
    else if (e.key === ' ') { e.preventDefault(); toggleAutoPlay(); }
    else if (e.key === 'Home') { e.preventDefault(); jumpStart(); }
    else if (e.key === 'End') { e.preventDefault(); jumpEnd(); }
  });

  newHand('random');
}

init();
</script>
